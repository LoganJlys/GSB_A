<div class="container mt-5">
    <div class="text-center">
      <img src="assets/gsb-logo.png" alt="GSB Logo" class="mb-3" style="width: 150px;">
      <h2>Bienvenue chez GSB</h2>
    </div>
    
    <h3 class="text-center my-4">Saisie fiche hors frais pour le mois de Avril</h3>
    
    <form>
      <!-- Date de frais -->
      <div class="row mb-3">
        <label class="col-sm-3 col-form-label">Saisie des frais pour la date du :</label>
        <div class="col-sm-3">
          <input type="date" class="form-control" placeholder="jj/mm/aaaa">
        </div>
        <label class="col-sm-1 col-form-label text-center">au</label>
        <div class="col-sm-3">
          <input type="date" class="form-control" placeholder="jj/mm/aaaa">
        </div>
      </div>
      
      <!-- Informations du Visiteur -->
      <div class="border rounded p-3 mb-4">
        <h5 class="mb-3">VISITEUR</h5>
        <div class="row mb-3">
          <div class="col-sm-4">
            <input type="text" class="form-control" placeholder="Nom">
          </div>
          <div class="col-sm-4">
            <input type="text" class="form-control" placeholder="Prénom">
          </div>
          <div class="col-sm-4">
            <input type="text" class="form-control" placeholder="Matricule">
          </div>
        </div>
      </div>
      
      <!-- Frais hors forfait -->
      <div class="border rounded p-3 mb-4">
        <h5 class="mb-3">FRAIS HORS FORFAIT</h5>
        <div class="row mb-3">
          <div class="col-sm-6">
            <input type="text" class="form-control" placeholder="LIBELLE">
          </div>
          <div class="col-sm-4">
            <input type="number" class="form-control" placeholder="MONTANT">
          </div>
          <div class="col-sm-2 d-flex align-items-center">
            <span>€</span>
          </div>
        </div>
      </div>
      
      <!-- Boutons -->
      <div class="text-center">
        <button type="button" class="btn btn-secondary mx-2">Retour</button>
        <button type="submit" class="btn btn-primary mx-2">Envoyer</button>
        <button type="reset" class="btn btn-danger mx-2">Effacer</button>
      </div>
    </form>
  </div>
