<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <!-- Conteneur principal centré verticalement et horizontalement sur toute la hauteur de la fenêtre -->
  <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%; border-radius: 10px;">
    <!-- Carte avec ombre et padding, avec une largeur maximale de 400px et des bords arrondis -->
    <h1 class="text-center text-primary mb-4" style="font-size: 2rem;">Bienvenue</h1>
    <!-- Titre principal centré avec une couleur bleue et une taille de police de 2rem -->

    <p class="text-center text-muted">
      <!-- Texte d'introduction centré et de couleur gris -->
      Vous êtes connecté en tant que <span class="text-primary font-weight-bold">Visiteur</span>.
      <!-- Affichage du rôle de l'utilisateur avec un style de texte bleu et en gras -->
    </p>

    <div class="d-flex justify-content-center mt-4">
      <!-- Conteneur pour le bouton centré horizontalement avec un margin-top de 4 unités -->
      <button class="btn btn-primary" (click)="goToLogin()">
        <!-- Bouton avec un style primaire (bleu), qui déclenche la méthode goToLogin() au clic -->
        Retour à la page de connexion
      </button>
    </div>
  </div>
</div>
