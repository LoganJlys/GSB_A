<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%; border-radius: 10px;">
    <h1 class="text-center text-primary mb-4" style="font-size: 2rem;">GSB</h1>

    <form (submit)="login()">
      <div class="mb-3">
        <label for="email" class="form-label">Identifiant</label>
        <input type="text" id="email" class="form-control" [(ngModel)]="email" name="email" placeholder="Identifiant" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe</label>
        <input type="password" id="password" class="form-control" [(ngModel)]="password" name="password" placeholder="Mot de passe" required>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
      </div>

      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary">Se connecter</button>
      </div>
    </form>
  </div>
</div>
